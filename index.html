<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>路灯采集</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
#map{height:100%}
#bar{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,0.85);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
#bar .count{font-size:18px;font-weight:bold;color:#fbbf24}
#bar .hint{font-size:13px;color:#aaa}
#bar button{padding:12px 24px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer}
#bar .btn-on{background:#ef4444;color:#fff}
#bar .btn-off{background:#fbbf24;color:#000}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;background:#22c55e;color:#fff;padding:10px 24px;border-radius:20px;font-size:16px;font-weight:bold;display:none;box-shadow:0 4px 20px rgba(34,197,94,0.4)}
#toast.show{display:block;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="map"></div>
<div id="toast"></div>
<div id="bar">
  <div>
    <div class="count" id="cnt">0 盏</div>
    <div class="hint" id="hint">点右边按钮开始标注</div>
  </div>
  <button id="modeBtn" class="btn-off" onclick="toggleMode()">🎯 开始标注</button>
</div>
<script>
// === Supabase 配置 ===
const SUPABASE_URL = 'https://ogsmzdkmbwlpqwtansxr.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nc216ZGttYndscHF3dGFuc3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNzA4NjIsImV4cCI6MjA5OTg0Njg2Mn0.dO4BPDd-H3g1uHNnwsVkQrcup9nquDeGqSxkXREnDHM'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

// === 地图 ===
const map = L.map('map', {
  center: [35.2135, 106.2217], zoom: 17,
  zoomControl: false, attributionControl: false
})
L.control.zoom({ position: 'bottomleft' }).addTo(map)
L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxNativeZoom: 20, maxZoom: 22, subdomains: ['0','1','2','3']
}).addTo(map)

let placeMode = false
let markers = []
let count = 0

// 加载已有数据
async function loadExisting() {
  const { data } = await db.from('streetlights').select('*')
  if (data) {
    data.forEach(l => {
      const m = L.marker([l.lat, l.lng], {
        icon: L.divIcon({
          className: '',
          html: '<div style="width:16px;height:16px;background:#fbbf24;border:2px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(251,191,36,0.8),0 1px 3px rgba(0,0,0,0.4)"></div>',
          iconSize: [20,20], iconAnchor: [10,10]
        })
      }).addTo(map)
      m.bindPopup(`<div style="text-align:center;padding:8px;"><b>${l.name||l.id}</b></div>`)
      markers.push(m)
    })
    count = data.length
    updateBar()
  }
}

function updateBar() {
  document.getElementById('cnt').textContent = count + ' 盏'
}

// === 模式切换 ===
function toggleMode() {
  placeMode = !placeMode
  const btn = document.getElementById('modeBtn')
  const hint = document.getElementById('hint')
  if (placeMode) {
    btn.className = 'btn-on'
    btn.textContent = '🎯 标注中…'
    hint.textContent = '点击地图放置路灯'
    map.getContainer().style.cursor = 'crosshair'
    map.dragging.disable()
  } else {
    btn.className = 'btn-off'
    btn.textContent = '🎯 开始标注'
    hint.textContent = '点右边按钮开始标注'
    map.getContainer().style.cursor = ''
    map.dragging.enable()
  }
}

// === 点击地图 → 标注 ===
map.on('click', async (e) => {
  if (!placeMode) return
  const name = prompt('输入路灯编号（如 001）：')
  if (!name) return

  const light = {
    name: name.trim(),
    lat: parseFloat(e.latlng.lat.toFixed(6)),
    lng: parseFloat(e.latlng.lng.toFixed(6)),
    is_tenure_added: true,
    status: '正常'
  }

  // 保存到云端
  const { error } = await db.from('streetlights').insert(light)
  if (error) {
    alert('保存失败: ' + error.message)
    return
  }

  // 添加标记
  const m = L.marker([light.lat, light.lng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;background:#fbbf24;border:2px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(251,191,36,0.8),0 1px 3px rgba(0,0,0,0.4)"></div>',
      iconSize: [20,20], iconAnchor: [10,10]
    })
  }).addTo(map)
  m.bindPopup(`<div style="text-align:center;padding:8px;"><b>${light.name}</b></div>`)
  markers.push(m)
  count++
  updateBar()

  // 提示
  const toast = document.getElementById('toast')
  toast.textContent = '✅ 已保存 ' + light.name
  toast.className = 'show'
  setTimeout(() => toast.className = '', 1500)
})

// 启动
loadExisting()
</script>
</body>
</html>
