<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>路灯采集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
#map{height:100%}
#bar{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,0.9);color:#fff;padding:14px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between}
#bar .info{display:flex;flex-direction:column}
#bar .count{font-size:22px;font-weight:bold;color:#fbbf24}
#bar .hint{font-size:14px;color:#aaa;margin-top:2px}
#bar button{padding:14px 28px;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;min-width:120px;-webkit-tap-highlight-color:transparent}
.btn-place{background:#ef4444;color:#fff;box-shadow:0 0 20px rgba(239,68,68,0.5)}
.btn-pan{background:#fbbf24;color:#000}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:#22c55e;color:#fff;padding:14px 28px;border-radius:16px;font-size:20px;font-weight:bold;display:none;box-shadow:0 8px 32px rgba(34,197,94,0.5)}
#toast.show{display:block;animation:pop 0.3s}
@keyframes pop{from{opacity:0;transform:translate(-50%,-50%) scale(0.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>
<div id="map"></div>
<div id="toast"></div>
<div id="bar">
  <div class="info">
    <div class="count" id="cnt">0 盏</div>
    <div class="hint" id="hint">拖动找位置，点按钮标注</div>
  </div>
  <button id="modeBtn" class="btn-pan" onclick="toggleMode()">标注</button>
</div>

<script src="https://webapi.amap.com/maps?v=2.0&key=eb49df710d26d1c822f313da2bf740e0"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var db = supabase.createClient(
  'https://ogsmzdkmbwlpqwtansxr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nc216ZGttYndscHF3dGFuc3hyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4NDI3MDg2MiwiZXhwIjoyMDk5ODQ2ODYyfQ.O93B85dzFGYEicBb9kt3DTpywB-gKtCtnbwEq9_eklg'
)

var map, placeMode = false, count = 0, markers = []

// 初始化地图
map = new AMap.Map('map', {
  center: [106.2217, 35.2135],
  zoom: 17,
  layers: [new AMap.TileLayer.Satellite()],
  zoomEnable: true,
  dragEnable: true
})

// 加载已有路灯
async function loadExisting() {
  try {
    var r = await db.from('streetlights').select('*')
    if (r.data) {
      r.data.forEach(function(l) {
        var m = new AMap.Marker({
          position: [l.lng, l.lat],
          icon: new AMap.Icon({
            size: new AMap.Size(20, 20),
            imageSize: new AMap.Size(20, 20),
            image: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="#fbbf24" stroke="#fff" stroke-width="2"/></svg>')
          }),
          label: { content: l.name||String(l.id), direction: 'top', offset: new AMap.Pixel(0, -8) }
        })
        m.on('click', function() { alert('路灯: ' + (l.name||l.id)) })
        map.add(m)
        markers.push(m)
      })
      count = r.data.length; updateBar()
    }
  } catch(e) { document.getElementById('hint').textContent = '加载数据失败' }
}

function updateBar() { document.getElementById('cnt').textContent = count + ' 盏' }

// 模式切换
function toggleMode() {
  placeMode = !placeMode
  var btn = document.getElementById('modeBtn'), hint = document.getElementById('hint')
  if (placeMode) {
    btn.className = 'btn-place'; btn.textContent = '标注中'
    hint.textContent = '点击地图放置路灯'
    map.setStatus({ dragEnable: false })
  } else {
    btn.className = 'btn-pan'; btn.textContent = '标注'
    hint.textContent = '拖动找位置，点按钮标注'
    map.setStatus({ dragEnable: true })
  }
}

// 点击标注
map.on('click', async function(e) {
  if (!placeMode) return
  var name = prompt('输入路灯编号（如 001）：')
  if (!name) return

  var lnglat = e.lnglat
  var light = { name: name.trim(), lat: parseFloat(lnglat.lat.toFixed(6)), lng: parseFloat(lnglat.lng.toFixed(6)), is_tenure_added: true, status: '正常' }

  try {
    var r = await db.from('streetlights').insert(light)
    if (r.error) throw r.error
  } catch(err) { alert('保存失败: ' + (err.message||err)); return }

  var m = new AMap.Marker({
    position: [light.lng, light.lat],
    icon: new AMap.Icon({
      size: new AMap.Size(20, 20),
      imageSize: new AMap.Size(20, 20),
      image: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="#fbbf24" stroke="#fff" stroke-width="2"/></svg>')
    }),
    label: { content: light.name, direction: 'top', offset: new AMap.Pixel(0, -8) }
  })
  map.add(m); markers.push(m)
  count++; updateBar()

  var t = document.getElementById('toast')
  t.textContent = light.name + ' 已保存'
  t.className = 'show'
  setTimeout(function() { t.className = '' }, 1500)
})

loadExisting()
</script>
</body>
</html>
